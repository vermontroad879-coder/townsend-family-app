function getQ(dq,kid){return dq[kid]||[];}
function calcPts(kid,checks,side,dq){
  let p=0;
  if(!checks[kid])return 0;
  getQ(dq,kid).forEach(q=>DAYS.forEach(d=>{if(checks[kid]?.[q.id]?.[d])p+=Number(q.pts||1);}));
  GOLDEN_RULES.forEach(r=>DAYS.forEach(d=>{if(checks[kid]?.[r.id]?.[d])p+=r.pts;}));
  DAYS.forEach(d=>{if(checks[kid]?.[kid==="ellie"?ET_ID:FV_ID]?.[d])p+=0.5;});
  SIDE_QUESTS.forEach(c=>c.quests.forEach(q=>{if(side[kid]?.[q.id])p+=c.pts;}));
  return Math.round(p*10)/10;
}
function corePct(kid,checks,dq){
  const qs=getQ(dq,kid);if(!qs.length||!checks[kid])return 0;
  let t=0,d=0;
  qs.forEach(q=>DAYS.forEach(day=>{t++;if(checks[kid]?.[q.id]?.[day])d++;}));
  return t===0?0:Math.round(d/t*100);
}
function trackDays(kid,checks){
  return DAYS.filter(d=>checks[kid]?.[kid==="ellie"?ET_ID:FV_ID]?.[d]).length;
}
function sideCount(kid,side){let n=0;SIDE_QUESTS.forEach(c=>c.quests.forEach(q=>{if(side[kid]?.[q.id])n++;}));return n;}
function legendEarned(kid,checks,dq){return corePct(kid,checks,dq)===100&&trackDays(kid,checks)===7;}

function blankChecks(dq){
  const o={};
  KIDS.forEach(k=>{
    o[k.id]={};
    getQ(dq,k.id).forEach(q=>{o[k.id][q.id]={};DAYS.forEach(d=>{o[k.id][q.id][d]=false;});});
    GOLDEN_RULES.forEach(r=>{o[k.id][r.id]={};DAYS.forEach(d=>{o[k.id][r.id][d]=false;});});
    const tid=k.id==="ellie"?ET_ID:FV_ID;
    o[k.id][tid]={};DAYS.forEach(d=>{o[k.id][tid][d]=false;});
  });
  return o;
}
function blankSide(){
  const o={};KIDS.forEach(k=>{o[k.id]={};SIDE_QUESTS.forEach(c=>c.quests.forEach(q=>{o[k.id][q.id]=false;}));});return o;
}
function mergeSide(snap){
  const b=blankSide();if(!snap)return b;
  KIDS.forEach(k=>{if(snap[k.id])Object.keys(snap[k.id]).forEach(q=>{b[k.id][q]=snap[k.id][q];});});return b;
}

function App(){
  const[fbReady,setFbReady]=useState(!!window.__fbReady);
  const[loading,setLoading]=useState(true);
  const[currentDay,setCurrentDay]=useState(getCurrentDay);
  const[screen,setScreen]=useState("home");

  const[editorKid,setEditorKid]=useState("jude");
  const[toast,setToast]=useState(null);
  const[msgModal,setMsgModal]=useState(null);
  const[msgText,setMsgText]=useState("");
  const[msgFrom,setMsgFrom]=useState("jude");
  const[newPost,setNewPost]=useState("");
  const[postAs,setPostAs]=useState("Mom");
  // all posters: parents + kids
  const ALL_POSTERS=[
    {id:"Mom", name:"Mom", avatar:"👩", color:"#E07A5F"},
    {id:"Dad", name:"Dad", avatar:"👨", color:"#3D405B"},
    ...KIDS.map(k=>({id:k.id,name:k.name,avatar:k.avatar,color:k.color})),
  ];
  const[showAddEv,setShowAddEv]=useState(false);
  const[newEv,setNewEv]=useState({title:"",date:"",day:"",who:""});
  const[liked,setLiked]=useState({});
  const BF={label:"",desc:"",pts:"1",icon:"🛏️",editKey:null};
  const[choreForm,setChoreForm]=useState(BF);
  const[confirmDel,setConfirmDel]=useState(null);
  const[dynQuests,setDynQuests]=useState({jude:[],blake:[],avery:[],ellie:[]});
  const[checks,setChecks]=useState({});
  const[side,setSide]=useState(blankSide());
  const[pending,setPending]=useState({});
  const[approved,setApproved]=useState({});
  const[redeemed,setRedeemed]=useState([]);
  const[activity,setActivity]=useState([]);
  const[posts,setPosts]=useState([]);
  const[messages,setMessages]=useState({Mom:[],Dad:[]});
  const[events,setEvents]=useState([]);

  const toast$=(msg,dur=2500)=>{setToast(msg);setTimeout(()=>setToast(null),dur);};

  useEffect(()=>{
    if(window.__fbReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("fbReady",h);return()=>window.removeEventListener("fbReady",h);
  },[]);

  useEffect(()=>{
    function sch(){const now=new Date();const ms=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0)-now;return setTimeout(()=>{setCurrentDay(getCurrentDay());sch();},ms+500);}
    const t=sch();return()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const{__db:db,__ref:ref,__onValue:onVal,__push:push,__set:set}=window;
    let loaded=0;
    const done=()=>{loaded++;if(loaded>=11)setLoading(false);};
    const unsubs=[
      onVal(ref(db,"parentPin"),s=>{
        const v=s.val();
        if(v){setCurrentPin(v);}
        else{set(ref(db,"parentPin"),"1234");} // seed default
        done();
      }),
      onVal(ref(db,"dynamicQuests"),s=>{
        const v=s.val();
        if(v){
          const out={};
          KIDS.forEach(k=>{
            out[k.id]=v[k.id]?Object.entries(v[k.id]).map(([fk,q])=>({...q,_fbKey:fk})):[];
          });
          setDynQuests(out);
        } else {
          KIDS.forEach(k=>DEFAULT_QUESTS[k.id].forEach(q=>push(ref(db,"dynamicQuests/"+k.id),q)));
        }
        done();
      }),
      onVal(ref(db,"checks"),s=>{
        const raw=s.val()||{};
        const out={};
        KIDS.forEach(k=>{
          out[k.id]={};
          const ks=raw[k.id]||{};
          Object.keys(ks).forEach(qid=>{
            out[k.id][qid]={};
            Object.keys(ks[qid]||{}).forEach(d=>{out[k.id][qid][d]=ks[qid][d];});
          });
        });
        setChecks(out);done();
      }),
      onVal(ref(db,"sideChecks"),s=>{setSide(mergeSide(s.val()));done();}),
      onVal(ref(db,"pending"),   s=>{setPending(s.val()||{});done();}),
      onVal(ref(db,"activity"),  s=>{
        const v=s.val();
        if(v){const arr=Object.entries(v).map(([k,x])=>({...x,_key:k}));arr.sort((a,b)=>(b.ts||0)-(a.ts||0));setActivity(arr.slice(0,15));}
        else setActivity([]);
        done();
      }),
      onVal(ref(db,"approved"),  s=>{setApproved(s.val()||{});done();}),
      onVal(ref(db,"redeemed"),  s=>{
        const v=s.val();
        setRedeemed(v?Object.entries(v).map(([k,x])=>({...x,_key:k})).reverse():[]);done();
      }),
      onVal(ref(db,"posts"),s=>{
        const v=s.val();
        if(v){const arr=Object.entries(v).map(([k,x])=>({...x,_key:k}));arr.sort((a,b)=>(b.ts||0)-(a.ts||0));setPosts(arr);}
        else{
          [{author:"Dad",avatar:"👨",color:"#3D405B",text:"Cheering you all on from bed! Thank you for keeping everything going. You are all absolute champions.",time:"just now",likes:0,ts:Date.now()-120000},
           {author:"Mom",avatar:"👩",color:"#E07A5F",text:"Grocery run Saturday morning. Add to the fridge list by Friday night!",time:"1h ago",likes:0,ts:Date.now()-3600000}]
          .forEach(p=>push(ref(db,"posts"),p));
        }
        done();
      }),
      onVal(ref(db,"messages"),s=>{
        const v=s.val()||{};const o={Mom:[],Dad:[]};
        ["Mom","Dad"].forEach(p=>{if(v[p])o[p]=Object.entries(v[p]).map(([k,x])=>({...x,_key:k})).sort((a,b)=>(a.ts||0)-(b.ts||0));});
        setMessages(o);done();
      }),
      onVal(ref(db,"events"),s=>{
        const v=s.val();
        if(v)setEvents(Object.entries(v).map(([k,x])=>({...x,_key:k})));
        else{

          .forEach(e=>push(ref(db,"events"),e));
        }
        done();
      }),
    ];
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

    const{__db:db,__ref:ref,__push:push,__onValue:onVal,__set:set}=window;

    const{__db:db,__ref:ref,__set:set,__push:push}=window;

  const toggleCheck=(kid,qid,day)=>{
    if(day!==currentDay)return;
    const{__db:db,__ref:ref,__set:set,__push:push}=window;
    const k=KIDS.find(x=>x.id===kid);
    const allQ=[...getQ(dynQuests,kid),...GOLDEN_RULES,{id:kid==="ellie"?ET_ID:FV_ID,label:kid==="ellie"?"No Mess Day":"Daily Fruit/Veg",pts:0.5}];
    const q=allQ.find(x=>x.id===qid)||{label:qid,pts:1};
    const existing=Object.entries(pending).find(([,v])=>v.kidId===kid&&v.qid===qid&&v.day===day);

    if(checks[kid]?.[qid]?.[day]){set(ref(db,"checks/"+kid+"/"+qid+"/"+day),false);return;}

    set(ref(db,"sideChecks/"+kid+"/"+qid),nv);

  const denyChore=(pkey,entry)=>{

  const toggleApprove=(kid)=>{
    const{__db:db,__ref:ref,__set:set}=window;

  const redeemReward=(reward,kid)=>{
    const{__db:db,__ref:ref,__push:push}=window;
    if(reward.isLegend){

    } else if(reward.pctReq!==undefined){
      const pct=corePct(kid,checks,dynQuests);
      if(pct<reward.pctReq){toast$("Need "+reward.pctReq+"% core chores! Currently "+pct+"%",3000);return;}

      const pts=calcPts(kid,checks,side,dynQuests);
      if(pts<reward.pts){toast$("Need "+(reward.pts-pts).toFixed(1)+" more pts!");return;}

    const k=KIDS.find(x=>x.id===kid);
    push(ref(db,"redeemed"),{...reward,by:k.name,avatar:k.avatar,when:"just now",ts:Date.now()});

  const handlePost=()=>{
    const{__db:db,__ref:ref,__push:push}=window;

                Dad{messages.Dad.length>0&&<span style={{background:"#3D405B",color:"#fff",borderRadius:"50%",padding:"0 4px",fontSize:9,marginLeft:2}}>{messages.Dad.length}</span>}
              </button>

                const pts=calcPts(k.id,checks,side,dynQuests),pct=corePct(k.id,checks,dynQuests),fv=trackDays(k.id,checks),leg=legendEarned(k.id,checks,dynQuests);

                  <div key={k.id} onClick={()=>{setActiveKid(k.id);setScreen("quest");}}
                    style={{background:"#fff",borderRadius:14,padding:14,borderTop:"3px solid "+k.color,cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.07)",position:"relative"}}>

                  </div>

            {parentMode&&(
              <div style={{background:"linear-gradient(135deg,#1E1B4B,#312E81)",borderRadius:16,padding:14,marginBottom:14,border:"2px solid #6366F1"}}>

                      <div style={{fontWeight:"bold",fontSize:14,color:"#1E1B4B"}}>{reward.label}</div>
                      <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{reward.sub}</div>
                      {reward.pctReq!==undefined&&<div style={{fontSize:12,color:reward.color,fontWeight:"bold",marginTop:3}}>Requires {reward.pctReq}% core chores. You: {myPct}%</div>}
                      {reward.pts&&!reward.pctReq&&!reward.isLegend&&<div style={{fontSize:12,color:reward.color,fontWeight:"bold",marginTop:3}}>Costs {reward.pts} pts. You: {myPts}pts</div>}
                      {reward.isLegend&&<div style={{fontSize:11,color:"#F59E0B",marginTop:3}}>Requires 100% chores + daily goal 7/7</div>}
                    </div>
                    <button onClick={()=>redeemReward(reward,activeKid)} style={{background:can?reward.color:"#E5E7EB",color:can?"#fff":"#9CA3AF",border:"none",borderRadius:12,padding:"8px 11px",fontSize:12,cursor:can?"pointer":"default"}}>
                      {can?"Claim":"Locked"}
                    </button>
                  </div>
                </div>
              );
            })}

            {redeemed.length>0&&(
              <>
                <div style={{fontSize:12,color:"#9CA3AF",margin:"16px 0 8px",fontStyle:"italic"}}>Recently claimed</div>
                {redeemed.map((r,i)=>(
                  <div key={r._key||i} style={{...C.card,display:"flex",gap:10,alignItems:"center",borderLeft:"4px solid #10B981"}}>
                    <div style={{fontSize:22}}>{r.icon}</div>
                    <div><div style={{fontWeight:"bold",fontSize:13,color:"#1E1B4B"}}>{r.label}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{r.avatar} {r.by} {r.when}</div></div>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {screen==="calendar"&&(
          <div style={{padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,color:"#6B7280",fontStyle:"italic"}}>Upcoming events</div>
              {parentMode&&<button onClick={()=>setShowAddEv(!showAddEv)} style={C.btn("#6366F1")}>Add Event</button>}
            </div>
            {showAddEv&&(
              <div style={{...C.card,marginBottom:16}}>
                <div style={{fontSize:14,fontWeight:"bold",marginBottom:10,color:"#1E1B4B"}}>New Event</div>
                {[["title","e.g. Doctor appt"],["date","e.g. Jun 15"],["day","e.g. Mon"],["who","e.g. Mom + Dad"]].map(([k,ph])=>(
                  <input key={k} value={newEv[k]} onChange={e=>setNewEv({...newEv,[k]:e.target.value})} placeholder={ph} style={C.inp}/>
                ))}
                <button onClick={addEvent} style={{...C.btn("#6366F1"),width:"100%",borderRadius:10,padding:"10px"}}>Save</button>
              </div>
            )}
            {events.map(ev=>(
              <div key={ev._key||ev.id} style={{...C.card,display:"flex",alignItems:"center",gap:14}}>
                <div style={{background:ev.color,borderRadius:12,width:50,height:50,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}>
                  <div style={{fontSize:10,opacity:0.85}}>{ev.day}</div>
                  <div style={{fontSize:15,fontWeight:"bold"}}>{(ev.date||"").split(" ")[1]}</div>
                </div>
                <div>
                  <div style={{fontWeight:"bold",fontSize:15,color:"#1E1B4B"}}>{ev.title}</div>
                  <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{ev.who}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {screen==="photos"&&(
          <div style={{padding:16}}>
            <div style={{fontSize:12,color:"#9CA3AF",marginBottom:14,fontStyle:"italic"}}>Family memories</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {PHOTOS.map(p=>(
                <div key={p.id} style={{borderRadius:16,overflow:"hidden",background:p.bg,aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(0,0,0,0.12)",cursor:"pointer",position:"relative"}}>
                  <div style={{fontSize:44}}>{p.emoji}</div>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.32)",color:"#fff",padding:"8px 10px",fontSize:12}}>
                    <div style={{fontWeight:"bold"}}>{p.label}</div>
                    <div style={{opacity:0.8,fontSize:11}}>by {p.author}</div>
                  </div>
                </div>
              ))}
              <div style={{borderRadius:16,border:"2px dashed #374151",aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#4B5563",gap:6}}>
                <div style={{fontSize:28}}>+</div><div style={{fontSize:12}}>Add Memory</div>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:460,background:"#12122A",borderTop:"1px solid #2D2B5A",display:"flex",zIndex:20}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setScreen(t.id)} style={{flex:1,background:"none",border:"none",padding:"11px 4px 9px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:screen===t.id?"#818CF8":"#4B5563"}}>
            <div style={{fontSize:18}}>{t.icon}</div>
            <div style={{fontSize:9}}>{t.label}</div>
            {screen===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:"#6366F1"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
