  const firebaseConfig = {
    apiKey: "AIzaSyAgdfWcHOmUwfyj7i4Q-AW0EYBec-XY1aI",
    authDomain: "the-townsend-app.firebaseapp.com",
    databaseURL: "https://the-townsend-app-default-rtdb.firebaseio.com",
    projectId: "the-townsend-app",
    storageBucket: "the-townsend-app.firebasestorage.app",
    messagingSenderId: "586695629109",
    appId: "1:586695629109:web:010703c7c044607e0fd47c"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  window.__ref = ref;
  window.__set = set;
  window.__push = push;
  window.__onValue = onValue;
  window.__fbReady = true;
  window.dispatchEvent(new Event("fbReady"));
</script>

// ── HELPERS ───────────────────────────────────────────────────
function blankChecks(){
  const o={};
  KIDS.forEach(k=>{
    o[k.id]={};
    k.quests.forEach(q=>{o[k.id][q.id]={};DAYS.forEach(d=>{o[k.id][q.id][d]=false;});});
    GOLDEN_RULES.forEach(r=>{o[k.id][r.id]={};DAYS.forEach(d=>{o[k.id][r.id][d]=false;});});
    const tid=k.id==="ellie"?ET_ID:FV_ID;
    o[k.id][tid]={};DAYS.forEach(d=>{o[k.id][tid][d]=false;});
  });
  return o;
}
function blankSide(){
  const o={};
  KIDS.forEach(k=>{o[k.id]={};SIDE_QUESTS.forEach(c=>c.quests.forEach(q=>{o[k.id][q.id]=false;}));});
  return o;
}
function mergeChecks(snap){
  const b=blankChecks();
  if(!snap)return b;
  KIDS.forEach(k=>{
    if(!snap[k.id])return;
    Object.keys(snap[k.id]).forEach(qid=>{
      if(!b[k.id][qid])b[k.id][qid]={};
      Object.keys(snap[k.id][qid]||{}).forEach(d=>{b[k.id][qid][d]=snap[k.id][qid][d];});
    });
  });
  return b;
}
function mergeSide(snap){
  const b=blankSide();
  if(!snap)return b;
  KIDS.forEach(k=>{if(snap[k.id])Object.keys(snap[k.id]).forEach(q=>{b[k.id][q]=snap[k.id][q];});});
  return b;
}
function calcPts(kid,checks,side){
  let p=0;
  const k=KIDS.find(x=>x.id===kid);
  if(!k||!checks[kid])return 0;
  k.quests.forEach(q=>DAYS.forEach(d=>{if(checks[kid]?.[q.id]?.[d])p+=q.pts;}));
  GOLDEN_RULES.forEach(r=>DAYS.forEach(d=>{if(checks[kid]?.[r.id]?.[d])p+=r.pts;}));
  const tid=kid==="ellie"?ET_ID:FV_ID;
  DAYS.forEach(d=>{if(checks[kid]?.[tid]?.[d])p+=0.5;});
  SIDE_QUESTS.forEach(c=>c.quests.forEach(q=>{if(side[kid]?.[q.id])p+=c.pts;}));
  return Math.round(p*10)/10;
}
function corePct(kid,checks){
  const k=KIDS.find(x=>x.id===kid);
  if(!k||!checks[kid])return 0;
  let t=0,d=0;
  k.quests.forEach(q=>DAYS.forEach(day=>{t++;if(checks[kid]?.[q.id]?.[day])d++;}));
  return t===0?0:Math.round(d/t*100);
}
function trackDays(kid,checks){
  const tid=kid==="ellie"?ET_ID:FV_ID;
  return DAYS.filter(d=>checks[kid]?.[tid]?.[d]).length;
}
function sideCount(kid,side){
  let n=0;SIDE_QUESTS.forEach(c=>c.quests.forEach(q=>{if(side[kid]?.[q.id])n++;}));return n;
}
function legendEarned(kid,checks){return corePct(kid,checks)===100&&trackDays(kid,checks)===7;}

// ── STYLES ────────────────────────────────────────────────────
const C = {
  card:  {background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 16px rgba(0,0,0,0.07)"},
  btn:   (bg,col="#fff",ex={})=>({background:bg,color:col,border:"none",borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer",...ex}),
  input: {width:"100%",marginBottom:8,border:"1.5px solid #e8ddd4",borderRadius:10,padding:"9px 12px",fontSize:14,outline:"none",boxSizing:"border-box",background:"#fafaf8",color:"#333",display:"block"},
  pill:  (on,col)=>({background:on?col:"rgba(255,255,255,0.06)",color:on?"#fff":"#9CA3AF",border:on?`2px solid ${col}`:"2px solid transparent",borderRadius:14,padding:"6px 12px",fontSize:12,cursor:"pointer",flexShrink:0,fontWeight:on?"bold":"normal"}),
};

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [fbReady,  setFbReady]  = useState(!!window.__fbReady);
  const [loading,  setLoading]  = useState(true);
  const [screen,   setScreen]   = useState("home");
  const [activeKid,setActiveKid]= useState("jude");
  const [questView,setQuestView]= useState("grid");
  const [lootMode, setLootMode] = useState("paid");
  const [parentMode,setParentMode]=useState(false);
  const [toast,    setToast]    = useState(null);
  const [msgModal, setMsgModal] = useState(null);
  const [msgText,  setMsgText]  = useState("");
  const [msgFrom,  setMsgFrom]  = useState("jude");
  const [newPost,  setNewPost]  = useState("");
  const [postAs,   setPostAs]   = useState("Mom");
  const [showAddEv,setShowAddEv]= useState(false);
  const [newEv,    setNewEv]    = useState({title:"",date:"",day:"",who:""});
  const [liked,    setLiked]    = useState({});

  const [checks,   setChecks]   = useState(blankChecks);
  const [side,     setSide]     = useState(blankSide);
  const [approved, setApproved] = useState({});
  const [redeemed, setRedeemed] = useState([]);
  const [posts,    setPosts]    = useState([]);
  const [messages, setMessages] = useState({Mom:[],Dad:[]});
  const [events,   setEvents]   = useState([]);

  const toast$ = (msg,dur=2500)=>{setToast(msg);setTimeout(()=>setToast(null),dur);};

  // wait for firebase module
  useEffect(()=>{
    if(window.__fbReady){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("fbReady",h);
    return()=>window.removeEventListener("fbReady",h);
  },[]);

  // subscribe once firebase is ready
  useEffect(()=>{
    if(!fbReady)return;
    const {__db:db,__ref:ref,__onValue:onVal,__push:push,__set:set}=window;
    let loaded=0;
    const done=()=>{loaded++;if(loaded>=7)setLoading(false);};

    const unsubs=[
      onVal(ref(db,"checks"),    s=>{setChecks(mergeChecks(s.val()));done();}),
      onVal(ref(db,"sideChecks"),s=>{setSide(mergeSide(s.val()));done();}),
      onVal(ref(db,"approved"),  s=>{setApproved(s.val()||{});done();}),
      onVal(ref(db,"redeemed"),  s=>{
        const v=s.val();
        setRedeemed(v?Object.entries(v).map(([k,x])=>({...x,_key:k})).reverse():[]);
        done();
      }),
      onVal(ref(db,"posts"),s=>{
        const v=s.val();
        if(v){
          const arr=Object.entries(v).map(([k,x])=>({...x,_key:k}));
          arr.sort((a,b)=>(b.ts||0)-(a.ts||0));
          setPosts(arr);
        } else {
          [{author:"Mom",avatar:"👩",color:"#E07A5F",text:"I'm cheering you all on from bed! 🤕❤️ Thank you for keeping everything going — you're all absolute champions.",time:"just now",likes:0,ts:Date.now()-120000},
           {author:"Dad",avatar:"👨",color:"#3D405B",text:"Grocery run Saturday morning. Add to the fridge list by Friday night! 🛒",time:"1h ago",likes:0,ts:Date.now()-3600000}]
          .forEach(p=>push(ref(db,"posts"),p));
        }
        done();
      }),
      onVal(ref(db,"messages"),s=>{
        const v=s.val()||{};
        const o={Mom:[],Dad:[]};
        ["Mom","Dad"].forEach(p=>{
          if(v[p])o[p]=Object.entries(v[p]).map(([k,x])=>({...x,_key:k})).sort((a,b)=>(a.ts||0)-(b.ts||0));
        });
        setMessages(o);done();
      }),
      onVal(ref(db,"events"),s=>{
        const v=s.val();
        if(v){setEvents(Object.entries(v).map(([k,x])=>({...x,_key:k})));}
        else{
          [{title:"Mom's Doctor Appt",date:"Jun 3",day:"Tue",color:"#E07A5F",who:"Mom + Dad",ts:1},
           {title:"Physio",           date:"Jun 7",day:"Sat",color:"#E07A5F",who:"Mom",      ts:2},
           {title:"Grocery Run",      date:"Jun 1",day:"Sat",color:"#3D405B",who:"Dad",      ts:3}]
          .forEach(e=>push(ref(db,"events"),e));
        }
        done();
      }),
    ];
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

  // ── FB ACTIONS ──────────────────────────────────────────────
  const toggleCheck=(kid,qid,day)=>{
    const {__db:db,__ref:ref,__set:set}=window;
    const nv=!checks[kid]?.[qid]?.[day];
    setChecks(p=>({...p,[kid]:{...p[kid],[qid]:{...p[kid][qid],[day]:nv}}}));
    set(ref(db,`checks/${kid}/${qid}/${day}`),nv);
  };
  const toggleSide=(kid,qid,pts)=>{
    const {__db:db,__ref:ref,__set:set}=window;
    const nv=!side[kid]?.[qid];
    setSide(p=>({...p,[kid]:{...p[kid],[qid]:nv}}));
    set(ref(db,`sideChecks/${kid}/${qid}`),nv);
    const k=KIDS.find(x=>x.id===kid);
    toast$(nv?`+${pts} pts for ${k.name}! ⚡`:`Removed ${pts} pts from ${k.name}`);
  };
  const resetWeek=()=>{
    const {__db:db,__ref:ref,__set:set}=window;
    const bc=blankChecks(),bs=blankSide();
    setChecks(bc);setSide(bs);setApproved({});
    set(ref(db,"checks"),bc);set(ref(db,"sideChecks"),bs);set(ref(db,"approved"),{});
    toast$("Week reset! Fresh start 🌅");
  };
  const toggleApprove=(kid)=>{
    const {__db:db,__ref:ref,__set:set}=window;
    const nv=!approved[kid];
    setApproved(p=>({...p,[kid]:nv}));
    set(ref(db,`approved/${kid}`),nv);
    toast$(nv?"Week approved! 👑":"Approval removed");
  };
  const redeemReward=(reward,kid)=>{
    const {__db:db,__ref:ref,__push:push}=window;
    if(reward.isLegend){
      if(!legendEarned(kid,checks)){toast$("Complete ALL core chores + daily goal to unlock! 🏆",3000);return;}
    } else {
      if(calcPts(kid,checks,side)<reward.pts){toast$(`Need ${(reward.pts-calcPts(kid,checks,side)).toFixed(1)} more pts! 💪`);return;}
    }
    const k=KIDS.find(x=>x.id===kid);
    push(ref(db,"redeemed"),{...reward,by:k.name,avatar:k.avatar,when:"just now",ts:Date.now()});
    toast$(reward.isLegend?`🏆 ${k.name} earned CHORE-FREE WEEK! 👑`:`${k.name} claimed: ${reward.label} ${reward.icon}`,3500);
  };
  const handlePost=()=>{
    const {__db:db,__ref:ref,__push:push}=window;
    if(!newPost.trim())return;
    const s=postAs==="Mom"?{avatar:"👩",color:"#E07A5F"}:{avatar:"👨",color:"#3D405B"};
    push(ref(db,"posts"),{author:postAs,...s,text:newPost,time:"just now",likes:0,ts:Date.now()});
    setNewPost("");
  };
  const toggleLike=(key)=>{
    const {__db:db,__ref:ref,__set:set}=window;
    const post=posts.find(p=>p._key===key);if(!post)return;
    const al=liked[key];
    const nl=Math.max(0,(post.likes||0)+(al?-1:1));
    setLiked(p=>({...p,[key]:!al}));
    set(ref(db,`posts/${key}/likes`),nl);
  };
  const sendMsg=()=>{
    const {__db:db,__ref:ref,__push:push}=window;
    if(!msgText.trim())return;
    const f=KIDS.find(k=>k.id===msgFrom);
    push(ref(db,`messages/${msgModal}`),{from:f.name,avatar:f.avatar,color:f.color,text:msgText,time:"just now",ts:Date.now()});
    setMsgText("");toast$(`Message sent to ${msgModal}! 📨`);setMsgModal(null);
  };
  const addEvent=()=>{
    const {__db:db,__ref:ref,__push:push}=window;
    if(!newEv.title||!newEv.date)return;
    push(ref(db,"events"),{...newEv,color:"#6366F1",ts:Date.now()});
    setNewEv({title:"",date:"",day:"",who:""});setShowAddEv(false);
  };

  const kid=KIDS.find(k=>k.id===activeKid);

  // ── LOADING ──────────────────────────────────────────────────
  if(!fbReady||loading) return (
    <div style={{background:"#0F0F1A",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:48}}>⚔️</div>
      <div style={{color:"#818CF8",fontSize:18,fontWeight:"bold"}}>Townsend Family Quest Board</div>
      <div style={{color:"#4B5563",fontSize:13}}>{fbReady?"Loading quests…":"Connecting…"}</div>
      <div style={{width:36,height:36,border:"3px solid #312E81",borderTop:"3px solid #818CF8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    </div>
  );

  const TABS=[{id:"home",icon:"🏠",label:"Home"},{id:"quest",icon:"⚔️",label:"Quests"},{id:"loot",icon:"🎁",label:"Loot"},{id:"calendar",icon:"📅",label:"Events"},{id:"photos",icon:"📷",label:"Photos"}];

  return (
    <div style={{fontFamily:"Georgia,'Times New Roman',serif",background:"#0F0F1A",minHeight:"100vh",maxWidth:460,margin:"0 auto",display:"flex",flexDirection:"column",position:"relative"}}>

      {/* TOAST */}
      {toast&&<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:"#1E1B4B",color:"#C7D2FE",border:"1px solid #4F46E5",borderRadius:24,padding:"10px 22px",fontSize:13,zIndex:300,boxShadow:"0 8px 32px rgba(79,70,229,0.4)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* MESSAGE MODAL */}
      {msgModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

            <div style={{...C.card,padding:12,marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:"bold",color:"#1E1B4B",marginBottom:8}}>🎁 The Loot Table</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setLootMode("paid")} style={{background:lootMode==="paid"?"#6366F1":"#F3F4F6",color:lootMode==="paid"?"#fff":"#6B7280",border:"none",borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer"}}>💰 Budget Active</button>
                <button onClick={()=>setLootMode("free")} style={{background:lootMode==="free"?"#10B981":"#F3F4F6",color:lootMode==="free"?"#fff":"#6B7280",border:"none",borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer"}}>🆓 Zero Budget</button>
              </div>
            </div>

            <div style={{fontSize:11,color:"#9CA3AF",marginBottom:8}}>Redeeming as...</div>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
              {KIDS.map(k=><button key={k.id} onClick={()=>setActiveKid(k.id)} style={{background:activeKid===k.id?k.color:"#F3F4F6",color:activeKid===k.id?"#fff":"#6B7280",border:"none",borderRadius:20,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>{k.avatar} {k.name} · {calcPts(k.id,checks,side)}pts</button>)}
            </div>

            {(lootMode==="paid"?PAID_REWARDS:FREE_REWARDS).map(reward=>{
              const myPts=calcPts(activeKid,checks,side),can=reward.isLegend?legendEarned(activeKid,checks):myPts>=reward.pts;
              return(
                <div key={reward.id} style={{...C.card,borderLeft:`4px solid ${reward.color}`,opacity:can?1:0.5}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:26}}>{reward.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:reward.color,fontWeight:"bold"}}>{reward.tier.toUpperCase()}</div>
                      <div style={{fontWeight:"bold",fontSize:14,color:"#1E1B4B"}}>{reward.label}</div>
                      <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{reward.sub}</div>
                      {!reward.isLegend&&<div style={{fontSize:12,color:reward.color,fontWeight:"bold",marginTop:3}}>Costs {reward.pts} pts</div>}
                      {reward.isLegend&&<div style={{fontSize:11,color:"#F59E0B",marginTop:3}}>Requires: 100% chores + daily goal 7/7</div>}
                    </div>
                    <button onClick={()=>redeemReward(reward,activeKid)} style={{background:can?reward.color:"#E5E7EB",color:can?"#fff":"#9CA3AF",border:"none",borderRadius:12,padding:"8px 11px",fontSize:12,cursor:can?"pointer":"default"}}>
                      {can?"Claim ✨":"🔒"}
                    </button>
                  </div>
                </div>
              );
            })}

            {redeemed.length>0&&(
              <>
                <div style={{fontSize:12,color:"#9CA3AF",margin:"16px 0 8px",fontStyle:"italic"}}>Recently claimed</div>
                {redeemed.map((r,i)=>(
                  <div key={r._key||i} style={{...C.card,display:"flex",gap:10,alignItems:"center",borderLeft:"4px solid #10B981"}}>
                    <div style={{fontSize:22}}>{r.icon}</div>
                    <div><div style={{fontWeight:"bold",fontSize:13,color:"#1E1B4B"}}>{r.label}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{r.avatar} {r.by} · {r.when}</div></div>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {/* CALENDAR */}
        {screen==="calendar"&&(
          <div style={{padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,color:"#6B7280",fontStyle:"italic"}}>Upcoming events</div>
              {parentMode&&<button onClick={()=>setShowAddEv(!showAddEv)} style={C.btn("#6366F1")}>+ Add</button>}
            </div>
            {showAddEv&&(
              <div style={{...C.card,marginBottom:16}}>
                <div style={{fontSize:14,fontWeight:"bold",marginBottom:10,color:"#1E1B4B"}}>New Event</div>
                {[["title","e.g. Doctor appt"],["date","e.g. Jun 15"],["day","e.g. Mon"],["who","e.g. Mom + Dad"]].map(([k,ph])=>(
                  <input key={k} value={newEv[k]} onChange={e=>setNewEv({...newEv,[k]:e.target.value})} placeholder={ph} style={C.input}/>
                ))}
                <button onClick={addEvent} style={{...C.btn("#6366F1"),width:"100%",borderRadius:10,padding:"10px"}}>Save ✓</button>
              </div>
            )}
            {events.map(ev=>(
              <div key={ev._key||ev.id} style={{...C.card,display:"flex",alignItems:"center",gap:14}}>
                <div style={{background:ev.color,borderRadius:12,width:50,height:50,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0}}>
                  <div style={{fontSize:10,opacity:0.85}}>{ev.day}</div>
                  <div style={{fontSize:15,fontWeight:"bold"}}>{(ev.date||"").split(" ")[1]}</div>
                </div>
                <div>
                  <div style={{fontWeight:"bold",fontSize:15,color:"#1E1B4B"}}>{ev.title}</div>
                  <div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>👥 {ev.who}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* PHOTOS */}
        {screen==="photos"&&(
          <div style={{padding:16}}>
            <div style={{fontSize:12,color:"#9CA3AF",marginBottom:14,fontStyle:"italic"}}>Family memories 📸</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {PHOTOS.map(p=>(
                <div key={p.id} style={{borderRadius:16,overflow:"hidden",background:p.bg,aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(0,0,0,0.12)",cursor:"pointer",position:"relative"}}>
                  <div style={{fontSize:44}}>{p.emoji}</div>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.32)",color:"#fff",padding:"8px 10px",fontSize:12}}>
                    <div style={{fontWeight:"bold"}}>{p.label}</div>
                    <div style={{opacity:0.8,fontSize:11}}>by {p.author}</div>
                  </div>
                </div>
              ))}
              <div style={{borderRadius:16,border:"2px dashed #374151",aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#4B5563",gap:6}}>
                <div style={{fontSize:28}}>+</div><div style={{fontSize:12}}>Add Memory</div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:460,background:"#12122A",borderTop:"1px solid #2D2B5A",display:"flex",zIndex:20}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setScreen(t.id)} style={{flex:1,background:"none",border:"none",padding:"11px 4px 9px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:screen===t.id?"#818CF8":"#4B5563"}}>
            <div style={{fontSize:18}}>{t.icon}</div>
            <div style={{fontSize:9}}>{t.label}</div>
            {screen===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:"#6366F1"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
